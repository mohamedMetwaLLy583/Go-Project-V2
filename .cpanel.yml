deployment:
  tasks:
    - export DEPLOYPATH=/home/gosdevelopment/public_html/well-known
    - /bin/mkdir -p $DEPLOYPATH
    - /bin/cp -R * $DEPLOYPATH
    - /bin/cp .env.example $DEPLOYPATH/.env
    - /bin/sed -i "s/DB_DATABASE=.*/DB_DATABASE=gosdevelopment_main/" $DEPLOYPATH/.env
    - /bin/sed -i "s/DB_USERNAME=.*/DB_USERNAME=gosdevelopment_go/" $DEPLOYPATH/.env
    - /bin/sed -i "s/DB_PASSWORD=.*/DB_PASSWORD=\".N?~Gyh^T)7X!MNn\"/" $DEPLOYPATH/.env
    - /bin/sed -i "s/APP_URL=.*/APP_URL=https:\/\/go.sdevelopment.tech/" $DEPLOYPATH/.env
